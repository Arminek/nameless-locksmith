name: pages

# Build and deploy the web app (web/) to GitHub Pages. The solver runs as
# WebAssembly compiled from the shared Rust core (web-wasm/), so the site uses
# the exact same code as the CLI/TUI. We gate on the core's own tests, generate
# the shared data, build the wasm, then publish the static site.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "web-wasm/**"
      - "src/**"
      - "history-of-locks.md"
      - "Cargo.toml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (+ wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify solver, generate data, build wasm
        run: |
          cargo test -p nameless-locksmith --lib
          node web/build-data.mjs
          wasm-pack build web-wasm --target web --out-dir ../web/pkg --release

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - id: deploy
        uses: actions/deploy-pages@v4
