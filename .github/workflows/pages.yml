name: pages

# Build and deploy the web app (web/) to GitHub Pages. Regenerates the shared
# data from the i18n catalogs + history, verifies the JS solver against it, then
# publishes the static site.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "src/i18n/**"
      - "history-of-locks.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate data + verify solver
        run: |
          node web/build-data.mjs
          node web/verify.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - id: deploy
        uses: actions/deploy-pages@v4
