name: release

# Build cross-platform binaries and attach them to a GitHub Release.
# Triggers when you push a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# You can also run it manually from the Actions tab (workflow_dispatch).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          bin="locks${{ matrix.ext }}"
          dist="nameless-locksmith-${{ matrix.target }}"
          mkdir "$dist"
          cp "target/${{ matrix.target }}/release/$bin" "$dist/"
          cp history-of-locks.md "$dist/" 2>/dev/null || true
          cp README.md "$dist/" 2>/dev/null || true
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "$dist.zip" "$dist" >/dev/null
            echo "ASSET=$dist.zip" >> "$GITHUB_ENV"
          else
            tar czf "$dist.tar.gz" "$dist"
            echo "ASSET=$dist.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
